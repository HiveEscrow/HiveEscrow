name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --manifest-path contracts/hive-escrow/Cargo.toml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: cargo build --manifest-path contracts/hive-escrow/Cargo.toml --target wasm32-unknown-unknown --release

      - name: Optimize WASM
        run: stellar contract optimize --wasm target/wasm32-unknown-unknown/release/hive_escrow.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hive-escrow.wasm
          path: target/wasm32-unknown-unknown/release/hive_escrow.wasm
